[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    olikraus/U8g2@^2.35.20
build_flags = 
    -I src/config
    -I src/display
    -I src/display/assets
    -I src/display/screens
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_SPIRAM_USE_MALLOC=y